<!-- Add AI Feynman-method feedback block -->
<div id="feynman-block">
  <h2>Expliquez le concept de trigonométrie</h2>
  <textarea id="student-explanation"></textarea>
  <button id="submit-explanation">Soumettre</button>
  <div id="ai-diagnosis"></div>
  <div id="retry-hints"></div>
</div>

<script>
  // API credits for inference
  const apiCredits = 100;

  // Per-chapter prompt tuning
  const chapterNotation = "Trigonométrie";
  const chapterMethod = "Formules";
  const chapterVocabulary = "Fonction, trigonométrique, angle";

  // KaTeX-safe output
  const katexOutput = true;

  // Verification
  const verifyCourseAgent = () => {
    // npm run verify:course-agent
  };

  // AI Feynman-method feedback block logic
  const submitExplanation = () => {
    const studentExplanation = document.getElementById("student-explanation").value;
    // Call AI endpoint with student explanation and chapter context
    fetch("/api/feynman", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        studentExplanation,
        chapterNotation,
        chapterMethod,
        chapterVocabulary,
      }),
    })
      .then((response) => response.json())
      .then((data) => {
        const aiDiagnosis = data.aiDiagnosis;
        const retryHints = data.retryHints;
        document.getElementById("ai-diagnosis").innerHTML = aiDiagnosis;
        document.getElementById("retry-hints").innerHTML = retryHints;
      });
  };

  document.getElementById("submit-explanation").addEventListener("click", submitExplanation);
</script>
