<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Taux de variation et sécantes</title>
  <desc id="desc">Des droites sécantes se rapprochent d'une tangente.</desc>
  <rect width="900" height="460" fill="#fffdf8"/>
  <g stroke="#121212" stroke-width="3">
    <path d="M80 380H820" fill="none"/>
    <path d="M120 410V60" fill="none"/>
  </g>
  <path d="M130 345 C240 325, 350 270, 430 205 C520 132, 650 95, 790 78" fill="none" stroke="#3f7f8f" stroke-width="8" stroke-linecap="round"/>
  <path d="M250 300 L720 120" stroke="#b9d097" stroke-width="5" stroke-linecap="round"/>
  <path d="M310 263 L650 128" stroke="#f4a261" stroke-width="5" stroke-linecap="round"/>
  <path d="M360 232 L590 142" stroke="#d96c5f" stroke-width="5" stroke-linecap="round"/>
  <circle cx="410" cy="220" r="12" fill="#f4d35e" stroke="#121212" stroke-width="4"/>
  <circle cx="610" cy="135" r="10" fill="#d8e6c3" stroke="#121212" stroke-width="3"/>
  <circle cx="540" cy="160" r="10" fill="#f4a261" stroke="#121212" stroke-width="3"/>
  <circle cx="485" cy="186" r="10" fill="#d96c5f" stroke="#121212" stroke-width="3"/>
  <text x="426" y="214" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="28" font-weight="800" fill="#121212">A</text>
  <text x="646" y="134" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="800" fill="#121212">M se rapproche</text>
  <path d="M622 142 C590 162, 540 178, 500 188" fill="none" stroke="#121212" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#121212"/>
    </marker>
  </defs>
</svg>
