name: Verify

on:
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run general site check
        run: npm run verify

      - name: Run course sidebar check
        run: npm run verify:course-sidebar

      - name: Check for whitespace issues
        run: git diff --check

      - name: Run course agent check if course directory is touched
        if: github.event.pull_request.changed_files[*] == 'course/*'
        run: npm run verify:course-agent