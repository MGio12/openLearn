  <title>Objectif Lycee - Planning</title>
  <meta name="description" content="Planning Objectif Lycee : cours, activites et travail recommande dans une semaine lisible.">
  <meta name="theme-color" content="#F4D35E">

  <aside class="sidebar">

      <span class="mark mark--image" aria-hidden="true"><img src="assets/brand/trophy-logo-home.webp" width="52" height="52" alt=""></span>

    <div class="sb-group">

      <a href="progression.html" class="sb-item"><span class="ic"><i class="ph-bold ph-chart-line-up" aria-hidden="true"></i></span>Progression</a>
    </div>
    <div class="sb-group">
      <div class="head">Travail</div>
      <a href="contenu.html" class="sb-item"><span class="ic"><i class="ph-bold ph-book-open-text" aria-hidden="true"></i></span>Contenu</a>
      <a href="objectif.html" class="sb-item"><span class="ic"><i class="ph-bold ph-squares-four" aria-hidden="true"></i></span>Objectif</a>
    </div>
    <div class="sb-group">
      <div class="head">Compte</div>
      <a href="abonnement.html" class="sb-item"><span class="ic"><i class="ph-bold ph-credit-card" aria-hidden="true"></i></span>Abonnement</a>
      <a href="parametres.html" class="sb-item"><span class="ic"><i class="ph-bold ph-gear" aria-hidden="true"></i></span>Parametres</a>
    </div>
    <div class="sb-bottom">
      <a class="sb-about" href="apropos.html" aria-label="A propos d'Objectif Lycee">
        <span class="sb-about__icon" aria-hidden="true"><i class="ph-bold ph-info"></i></span>
        <span class="sb-about__label">A propos</span>
      </a>
      <div class="sb-profile"><div class="av">OP</div><div class="who"><span class="nm">Profil demo</span><span class="role">Lycee</span></div></div>
    </div>
  </aside>

  <div class="main">
    <section class="view active planning-view">
      <header class="planning-toolbar">
        <h1>Planning</h1>
        <p class="planning-toolbar__meta">
          Semaine type &middot; 08:00-20:00 &middot; <span data-schedule-meta>Europe/Paris - v1</span>
        </p>
      </header>

      <div class="planning-shell">
        <main class="planning-main" aria-labelledby="planning-week-title">
          <div class="planning-panel planning-panel--week">
            <div class="planning-panel__head">
              <div>
                <span class="planning-panel__eyebrow">08:00 - 20:00</span>
                <h2 id="planning-week-title">Semaine type</h2>
              </div>
              <span class="planning-panel__meta">Europe/Paris</span>
            </div>

            <div class="subject-legend" data-subject-legend aria-label="Legende des matieres"></div>
            <div class="planning-board" data-planning-board aria-label="Emploi du temps hebdomadaire"></div>
            <div class="mobile-agenda" data-mobile-agenda aria-label="Agenda mobile"></div>
          </div>
        </main>

        <aside class="planning-assistant" data-planning-assistant aria-labelledby="planning-assistant-title"></aside>
      </div>
    </section>
  </div>
